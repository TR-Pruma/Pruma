# Datasource H2 in-memory para testes
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hikari - override do driver de producao
spring.datasource.hikari.driver-class-name=org.h2.Driver
spring.datasource.hikari.pool-name=TestHikariPool
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=false

# JWT
jwt.secret=pruma-chave-secreta-minimo-32-caracteres-2025
jwt.expiration=86400000

# Desabilita auto-configure que requer infra externa no CI
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.oauth2.client.OAuth2ClientAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientWebMvcSecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration,\
  org.springframework.boot.autoconfigure.mail.MailSenderValidatorAutoConfiguration
