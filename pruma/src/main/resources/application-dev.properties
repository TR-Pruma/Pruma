# ==========================================
# PROFILE: DEV (desenvolvimento local)
# ==========================================
# NUNCA commitar valores reais aqui.
# Defina as variaveis de ambiente no seu sistema ou crie um arquivo .env
# (o .env ja esta no .gitignore)
#
# Variaveis necessarias (copie de .env.example):
#   DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD
#   JWT_SECRET, JWT_EXPIRATION
# ==========================================

# ==========================================
# Datasource - DEV
# ==========================================
spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:pruma}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ==========================================
# JPA / Hibernate - DEV
# ddl-auto=validate: Hibernate so valida o schema, nunca altera.
# O schema e gerenciado exclusivamente pelo Flyway.
# ==========================================
# application-dev.properties
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# Flyway - DEV
# baseline-version=18: o banco ja tem V1-V18 aplicados.
# Ao perder flyway_schema_history, o Flyway cria baseline em V18
# e executa apenas V19+, sem tentar re-executar migrations existentes.
# validate-on-migrate=false: permite alteracoes em migrations de dev.
# ==========================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=18
spring.flyway.validate-on-migrate=false
spring.flyway.out-of-order=false
spring.flyway.locations=classpath:db/migration

# ==========================================
# JWT - DEV
# ==========================================
jwt.secret=${JWT_SECRET:XNa1ssJc8IaU7nP3/SaLJh4nTv6GobXWuL8sbAu91IA=}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==========================================
# Logging - DEV (mais verboso)
# ==========================================
logging.level.org.springframework.security=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
logging.level.com.br.pruma=DEBUG
