# ==========================================
# PROFILE: DEV (desenvolvimento local)
# ==========================================
# NUNCA commitar valores reais aqui.
# Defina as variaveis de ambiente no seu sistema ou crie um arquivo .env
# (o .env ja esta no .gitignore)
#
# Variaveis necessarias (copie de .env.example):
#   DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD
#   JWT_SECRET, JWT_EXPIRATION
# ==========================================

# ==========================================
# Datasource - DEV
# ==========================================
spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:pruma}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ==========================================
# JPA / Hibernate - DEV
# ddl-auto=validate: Hibernate so valida o schema, nunca altera.
# O schema e gerenciado exclusivamente pelo Flyway.
# ==========================================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# Flyway - DEV
# baseline-version=9: quando flyway_schema_history nao existe (foi perdido),
# o Flyway cria a tabela com baseline em V9, pulando V1-V9 que ja estao
# aplicados no banco. Apenas V10+ serao executados.
# ATENCAO: se o banco for completamente zerado, restaurar baseline-version=1
# e dropar o schema para recriacao completa.
# ==========================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=9
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.locations=classpath:db/migration

# ==========================================
# JWT - DEV
# ==========================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==========================================
# Logging - DEV (mais verboso)
# ==========================================
logging.level.org.springframework.security=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
logging.level.com.br.pruma=DEBUG
