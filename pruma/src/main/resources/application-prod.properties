# ==========================================
# PROFILE: PROD (producao)
# ==========================================
# NUNCA commitar valores reais aqui.
# Em producao, as variaveis de ambiente devem ser injetadas pelo
# servidor / Docker / CI-CD / Vault (ex: AWS Secrets Manager, HashiCorp Vault)
#
# Variaveis obrigatorias em producao:
#   DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD
#   JWT_SECRET (minimo 64 chars, alta entropia - gere com: openssl rand -base64 64)
#   JWT_EXPIRATION
# ==========================================

# ==========================================
# Datasource - PROD
# useSSL=true e sslMode=REQUIRED obrigatorios em producao
# ==========================================
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=true&requireSSL=true&sslMode=REQUIRED&allowPublicKeyRetrieval=false&serverTimezone=America/Sao_Paulo&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ==========================================
# JPA / Hibernate - PROD
# ddl-auto=validate: nunca altera schema automaticamente em producao
# show-sql=false: nunca loga SQL em producao (risco LGPD)
# ==========================================
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=false

# ==========================================
# Flyway - PROD
# Habilitar Flyway em producao para controle de migrations
# ==========================================
spring.flyway.enabled=true
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.baseline-on-migrate=false

# ==========================================
# JWT - PROD
# Use openssl rand -base64 64 para gerar o secret
# ==========================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ==========================================
# Logging - PROD (minimo, sem dados sensiveis)
# ==========================================
logging.level.org.springframework.security=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.com.br.pruma=INFO
