# ==========================================
# Profile ativo
# Defina via variavel de ambiente: SPRING_PROFILES_ACTIVE=dev | prod
# Ou via argumento JVM: -Dspring.profiles.active=dev
# ==========================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ==========================================
# HikariCP - Pool de conexoes (compartilhado)
# ==========================================
spring.datasource.hikari.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.pool-name=PrumaHikariPool
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

# ==========================================
# JPA / Hibernate (compartilhado)
# ==========================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

# ==========================================
# Logging (compartilhado)
# ==========================================
logging.level.com.zaxxer.hikari=INFO
